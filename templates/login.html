<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>
    <!-- Page de connexion servie via la gateway -->
    <h1>Connexion</h1>
    {% if success_username %}
        <p style="color:green;">Compte <strong>{{ success_username }}</strong> cree avec succes. Tu peux te connecter maintenant.</p>
    {% endif %}
    <p>Cet ecran demarre maintenant un flux OAuth2. Clique sur le bouton ci-dessous pour etre redirige vers l'Auth Service.</p>
    <form action="{{ url_for('start_oauth_login') }}" method="get">
        <button type="submit">Se connecter via Auth Service</button>
    </form>
    <p>Pas encore de compte ? <a href="{{ url_for('register') }}">Inscris-toi ici</a>.</p>
</body>
</html>
